<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Socials</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" 
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #f1f5f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    header {
      padding: 60px 20px 30px;
      text-align: center;
    }

    header h1 {
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: -1px;
    }

    header p {
      margin-top: 10px;
      color: #94a3b8;
      font-size: 1rem;
    }

    .social-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 25px;
      width: 90%;
      max-width: 900px;
      padding: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 30px;
      text-align: center;
      text-decoration: none;
      color: inherit;
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .card:hover {
      transform: translateY(-8px);
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .card i {
      font-size: 48px;
      margin-bottom: 15px;
    }

    .card span {
      display: block;
      font-weight: 500;
      margin-top: 5px;
    }

    .placeholder {
      background: rgba(255, 255, 255, 0.03);
      border: 2px dashed rgba(255, 255, 255, 0.15);
      cursor: default;
    }

    .placeholder:hover {
      transform: none;
      box-shadow: none;
      background: rgba(255, 255, 255, 0.03);
    }

    .twitter { color: #1DA1F2; }
    .linkedin { color: #0077B5; }

    footer {
      margin-top: auto;
      padding: 30px;
      font-size: 0.85rem;
      color: #64748b;
    }
  </style>
</head>

<body>

  <header>
    <h1>Header</h1>
    <p>Footer</p>
  </header>

  <div class="social-container">

    <a class="card" href="https://discord.com" target="_blank">
      <i class="fa-brands fa-discord" style="color:#5865F2;"></i>
      <span>Shatterly on Discord</span>
    </a>

    <a class="card" href="https://twitter.com/AShatterly" target="_blank">
      <i class="fa-brands fa-x-twitter twitter"></i>
      <span>Twitter</span>
    </a>

    <a class="card" href="https://steamcommunity.com/id/SniperTeamTwo/" target="_blank">
      <i class="fa-brands fa-steam" style="color:#1b283;"></i>
      <span>ShaddyShack Steam</span>
    </a>

    <a class="card" href="https://linkedin.com" target="_blank">
      <i class="fa-brands fa-linkedin linkedin"></i>
      <span>LinkedIn - Linking Soon</span>
    </a>

    <!-- Empty Placeholder Square -->
    <div class="card placeholder">
      <span>Coming Soon</span>
    </div>

  </div>

  <footer>
    © 1999–2025 ShaddyShack Industries
  </footer>

</body>
</html>
