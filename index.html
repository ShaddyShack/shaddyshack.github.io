<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShaddyShack</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  font-family:'Inter',sans-serif;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:#f1f5f9;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

nav {
  display:flex;
  justify-content:center;
  gap:40px;
  padding:20px;
  background:rgba(0,0,0,0.6);
  position:fixed;
  width:100%;
  top:0;
  backdrop-filter:blur(8px);
  z-index:10;
}

nav a {
  text-decoration:none;
  color:white;
  font-weight:500;
  position:relative;
  transition:0.3s ease;
}

nav a::after {
  content:'';
  position:absolute;
  left:0;
  bottom:-6px;
  width:0;
  height:3px;
  background:#ffd700;
  transition:0.3s ease;
}

nav a:hover::after { width:100%; }
nav a:hover { transform:translateY(-3px); }

.hero {
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding-top:80px;
}

.hero h1 {
  font-size:3rem;
  margin-bottom:15px;
  transition:0.3s ease;
}

.hero h1:hover { transform:scale(1.05); }

.hero p {
  color:#94a3b8;
  font-size:1.1rem;
}

.cta {
  margin-top:30px;
}

.cta a {
  padding:14px 30px;
  background:rgba(255,255,255,0.08);
  border-radius:12px;
  text-decoration:none;
  color:white;
  transition:0.3s ease;
  border:1px solid rgba(255,255,255,0.1);
}

.cta a:hover {
  transform:translateY(-6px);
  background:rgba(255,255,255,0.15);
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

footer {
  text-align:center;
  padding:20px;
  font-size:0.85rem;
  color:#64748b;
}
</style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="projects.html">Projects</a>
  <a href="socials.html">Socials</a>
  <a href="resume.html">Resume</a>
</nav>

<section class="hero">
  <h1>ShaddyShack</h1>
  <p>Developer • Builder • Problem Solver</p>

  <div class="cta">
    <a href="projects.html">View My Projects</a>
  </div>
</section>

<footer>
© 1999–2026 ShaddyShack Industries
</footer>

</body>
</html>
